openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Nagibe Produção API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: team
    description: Team member operations
  - name: equipment
    description: Equipment operations
  - name: shoots
    description: Shoot/daily operations
  - name: checkout
    description: Equipment checkout and return
  - name: activity
    description: Activity log
  - name: dashboard
    description: Dashboard summary
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ──────── Dashboard ────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  # ──────── Team Members ────────
  /team:
    get:
      operationId: listTeamMembers
      tags: [team]
      summary: List all team members
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: role
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of team members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamMember"
    post:
      operationId: createTeamMember
      tags: [team]
      summary: Create a team member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTeamMemberBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMember"

  /team/{id}:
    get:
      operationId: getTeamMember
      tags: [team]
      summary: Get a team member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Team member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMember"
        "404":
          description: Not found
    patch:
      operationId: updateTeamMember
      tags: [team]
      summary: Update a team member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTeamMemberBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMember"
    delete:
      operationId: deleteTeamMember
      tags: [team]
      summary: Delete a team member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ──────── Equipment ────────
  /equipment:
    get:
      operationId: listEquipment
      tags: [equipment]
      summary: List all equipment
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of equipment
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Equipment"
    post:
      operationId: createEquipment
      tags: [equipment]
      summary: Create equipment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEquipmentBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Equipment"

  /equipment/{id}:
    get:
      operationId: getEquipment
      tags: [equipment]
      summary: Get equipment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Equipment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Equipment"
        "404":
          description: Not found
    patch:
      operationId: updateEquipment
      tags: [equipment]
      summary: Update equipment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEquipmentBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Equipment"
    delete:
      operationId: deleteEquipment
      tags: [equipment]
      summary: Delete equipment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ──────── Shoots ────────
  /shoots:
    get:
      operationId: listShoots
      tags: [shoots]
      summary: List all shoots
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: date
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of shoots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Shoot"
    post:
      operationId: createShoot
      tags: [shoots]
      summary: Create a shoot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateShootBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shoot"

  /shoots/{id}:
    get:
      operationId: getShoot
      tags: [shoots]
      summary: Get a shoot with full details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Shoot detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShootDetail"
        "404":
          description: Not found
    patch:
      operationId: updateShoot
      tags: [shoots]
      summary: Update a shoot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateShootBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shoot"
    delete:
      operationId: deleteShoot
      tags: [shoots]
      summary: Delete a shoot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /shoots/{id}/team:
    get:
      operationId: getShootTeam
      tags: [shoots]
      summary: Get shoot team members
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Shoot team
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ShootTeamMember"
    post:
      operationId: addShootTeamMember
      tags: [shoots]
      summary: Add team member to shoot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddShootTeamMemberBody"
      responses:
        "201":
          description: Added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShootTeamMember"

  /shoots/{id}/team/{memberId}:
    patch:
      operationId: updateShootTeamMember
      tags: [shoots]
      summary: Update shoot team member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: memberId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateShootTeamMemberBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShootTeamMember"
    delete:
      operationId: removeShootTeamMember
      tags: [shoots]
      summary: Remove team member from shoot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: memberId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed

  /shoots/{id}/equipment:
    get:
      operationId: getShootEquipment
      tags: [shoots]
      summary: Get shoot equipment items
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Shoot equipment
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ShootEquipmentItem"
    post:
      operationId: addShootEquipment
      tags: [shoots]
      summary: Add equipment to shoot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddShootEquipmentBody"
      responses:
        "201":
          description: Added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShootEquipmentItem"

  /shoots/{id}/equipment/{itemId}:
    patch:
      operationId: updateShootEquipment
      tags: [shoots]
      summary: Update shoot equipment item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateShootEquipmentBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShootEquipmentItem"
    delete:
      operationId: removeShootEquipment
      tags: [shoots]
      summary: Remove equipment from shoot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed

  /shoots/{id}/checkout:
    post:
      operationId: checkoutEquipment
      tags: [checkout]
      summary: Register equipment checkout for a shoot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutBody"
      responses:
        "201":
          description: Checkout registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Checkout"

  /shoots/{id}/return:
    post:
      operationId: returnEquipment
      tags: [checkout]
      summary: Register equipment return for a shoot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReturnBody"
      responses:
        "201":
          description: Return registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Return"

  /shoots/{id}/checkout-details:
    get:
      operationId: getShootCheckout
      tags: [checkout]
      summary: Get checkout details for a shoot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Checkout details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Checkout"

  /shoots/{id}/return-details:
    get:
      operationId: getShootReturn
      tags: [checkout]
      summary: Get return details for a shoot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Return details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Return"

  # ──────── Activity Log ────────
  /activity:
    get:
      operationId: listActivity
      tags: [activity]
      summary: List activity logs
      parameters:
        - name: shootId
          in: query
          schema:
            type: ["integer", "null"]
        - name: equipmentId
          in: query
          schema:
            type: ["integer", "null"]
        - name: teamMemberId
          in: query
          schema:
            type: ["integer", "null"]
        - name: type
          in: query
          schema:
            type: string
        - name: dateFrom
          in: query
          schema:
            type: string
        - name: dateTo
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Activity logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityLog"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    DashboardSummary:
      type: object
      properties:
        todayShoots:
          type: integer
        openShoots:
          type: integer
        equipmentInUse:
          type: integer
        equipmentPendingReturn:
          type: integer
        equipmentInMaintenance:
          type: integer
        activeTeamMembers:
          type: integer
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/ActivityLog"
        todayShootsList:
          type: array
          items:
            $ref: "#/components/schemas/Shoot"
      required:
        - todayShoots
        - openShoots
        - equipmentInUse
        - equipmentPendingReturn
        - equipmentInMaintenance
        - activeTeamMembers
        - recentActivity
        - todayShootsList

    TeamMember:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        primaryRole:
          type: string
        secondaryRole:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, inactive]
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, name, primaryRole, status, createdAt, updatedAt]

    CreateTeamMemberBody:
      type: object
      properties:
        name:
          type: string
        primaryRole:
          type: string
        secondaryRole:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, inactive]
          default: active
      required: [name, primaryRole]

    UpdateTeamMemberBody:
      type: object
      properties:
        name:
          type: string
        primaryRole:
          type: string
        secondaryRole:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, inactive]

    Equipment:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: string
        internalCode:
          type: ["string", "null"]
        totalQuantity:
          type: integer
        availableQuantity:
          type: integer
        status:
          type: string
          enum: [available, reserved, in_use, maintenance, damaged, pending_return]
        storageLocation:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        active:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, name, category, totalQuantity, availableQuantity, status, active, createdAt, updatedAt]

    CreateEquipmentBody:
      type: object
      properties:
        name:
          type: string
        category:
          type: string
        internalCode:
          type: ["string", "null"]
        totalQuantity:
          type: integer
          default: 1
        availableQuantity:
          type: integer
          default: 1
        status:
          type: string
          enum: [available, reserved, in_use, maintenance, damaged, pending_return]
          default: available
        storageLocation:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        active:
          type: boolean
          default: true
      required: [name, category]

    UpdateEquipmentBody:
      type: object
      properties:
        name:
          type: string
        category:
          type: string
        internalCode:
          type: ["string", "null"]
        totalQuantity:
          type: integer
        availableQuantity:
          type: integer
        status:
          type: string
          enum: [available, reserved, in_use, maintenance, damaged, pending_return]
        storageLocation:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        active:
          type: boolean

    Shoot:
      type: object
      properties:
        id:
          type: integer
        date:
          type: string
        time:
          type: ["string", "null"]
        location:
          type: string
        briefing:
          type: ["string", "null"]
        whatsappSummary:
          type: ["string", "null"]
        producerName:
          type: ["string", "null"]
        clientProject:
          type: ["string", "null"]
        priority:
          type: string
          enum: [low, medium, high, urgent]
        status:
          type: string
          enum: [planned, team_defined, equipment_separated, checkout_done, in_progress, return_pending, closed]
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, date, location, priority, status, createdAt, updatedAt]

    CreateShootBody:
      type: object
      properties:
        date:
          type: string
        time:
          type: ["string", "null"]
        location:
          type: string
        briefing:
          type: ["string", "null"]
        whatsappSummary:
          type: ["string", "null"]
        producerName:
          type: ["string", "null"]
        clientProject:
          type: ["string", "null"]
        priority:
          type: string
          enum: [low, medium, high, urgent]
          default: medium
        status:
          type: string
          enum: [planned, team_defined, equipment_separated, checkout_done, in_progress, return_pending, closed]
          default: planned
      required: [date, location]

    UpdateShootBody:
      type: object
      properties:
        date:
          type: string
        time:
          type: ["string", "null"]
        location:
          type: string
        briefing:
          type: ["string", "null"]
        whatsappSummary:
          type: ["string", "null"]
        producerName:
          type: ["string", "null"]
        clientProject:
          type: ["string", "null"]
        priority:
          type: string
          enum: [low, medium, high, urgent]
        status:
          type: string
          enum: [planned, team_defined, equipment_separated, checkout_done, in_progress, return_pending, closed]

    ShootTeamMember:
      type: object
      properties:
        id:
          type: integer
        shootId:
          type: integer
        teamMemberId:
          type: integer
        role:
          type: string
        confirmed:
          type: boolean
        teamMember:
          $ref: "#/components/schemas/TeamMember"
      required: [id, shootId, teamMemberId, role, confirmed, teamMember]

    AddShootTeamMemberBody:
      type: object
      properties:
        teamMemberId:
          type: integer
        role:
          type: string
        confirmed:
          type: boolean
          default: false
      required: [teamMemberId, role]

    UpdateShootTeamMemberBody:
      type: object
      properties:
        role:
          type: string
        confirmed:
          type: boolean

    ShootEquipmentItem:
      type: object
      properties:
        id:
          type: integer
        shootId:
          type: integer
        equipmentId:
          type: integer
        quantity:
          type: integer
        notes:
          type: ["string", "null"]
        conditionOut:
          type: ["string", "null"]
        equipment:
          $ref: "#/components/schemas/Equipment"
      required: [id, shootId, equipmentId, quantity, equipment]

    AddShootEquipmentBody:
      type: object
      properties:
        equipmentId:
          type: integer
        quantity:
          type: integer
          default: 1
        notes:
          type: ["string", "null"]
        conditionOut:
          type: ["string", "null"]
      required: [equipmentId]

    UpdateShootEquipmentBody:
      type: object
      properties:
        quantity:
          type: integer
        notes:
          type: ["string", "null"]
        conditionOut:
          type: ["string", "null"]

    CheckoutBody:
      type: object
      properties:
        deliveredBy:
          type: string
        reviewedBy:
          type: string
        receivedBy:
          type: string
        checkoutAt:
          type: ["string", "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/CheckoutItem"
      required: [deliveredBy, reviewedBy, receivedBy, items]

    CheckoutItem:
      type: object
      properties:
        equipmentId:
          type: integer
        quantity:
          type: integer
        conditionOut:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
      required: [equipmentId, quantity]

    Checkout:
      type: object
      properties:
        id:
          type: integer
        shootId:
          type: integer
        deliveredBy:
          type: string
        reviewedBy:
          type: string
        receivedBy:
          type: string
        checkoutAt:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/CheckoutItemDetail"
      required: [id, shootId, deliveredBy, reviewedBy, receivedBy, checkoutAt, items]

    CheckoutItemDetail:
      type: object
      properties:
        id:
          type: integer
        checkoutId:
          type: integer
        equipmentId:
          type: integer
        quantity:
          type: integer
        conditionOut:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        equipment:
          $ref: "#/components/schemas/Equipment"
      required: [id, checkoutId, equipmentId, quantity, equipment]

    ReturnBody:
      type: object
      properties:
        returnedBy:
          type: string
        reviewedBy:
          type: string
        receivedBy:
          type: string
        returnAt:
          type: ["string", "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/ReturnItem"
      required: [returnedBy, reviewedBy, receivedBy, items]

    ReturnItem:
      type: object
      properties:
        equipmentId:
          type: integer
        quantitySent:
          type: integer
        quantityReturned:
          type: integer
        conditionReturn:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        hasDamage:
          type: boolean
          default: false
      required: [equipmentId, quantitySent, quantityReturned]

    Return:
      type: object
      properties:
        id:
          type: integer
        shootId:
          type: integer
        returnedBy:
          type: string
        reviewedBy:
          type: string
        receivedBy:
          type: string
        returnAt:
          type: string
        hasPendencies:
          type: boolean
        items:
          type: array
          items:
            $ref: "#/components/schemas/ReturnItemDetail"
      required: [id, shootId, returnedBy, reviewedBy, receivedBy, returnAt, hasPendencies, items]

    ReturnItemDetail:
      type: object
      properties:
        id:
          type: integer
        returnId:
          type: integer
        equipmentId:
          type: integer
        quantitySent:
          type: integer
        quantityReturned:
          type: integer
        conditionReturn:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        hasDamage:
          type: boolean
        equipment:
          $ref: "#/components/schemas/Equipment"
      required: [id, returnId, equipmentId, quantitySent, quantityReturned, hasDamage, equipment]

    ShootDetail:
      type: object
      properties:
        id:
          type: integer
        date:
          type: string
        time:
          type: ["string", "null"]
        location:
          type: string
        briefing:
          type: ["string", "null"]
        whatsappSummary:
          type: ["string", "null"]
        producerName:
          type: ["string", "null"]
        clientProject:
          type: ["string", "null"]
        priority:
          type: string
          enum: [low, medium, high, urgent]
        status:
          type: string
          enum: [planned, team_defined, equipment_separated, checkout_done, in_progress, return_pending, closed]
        team:
          type: array
          items:
            $ref: "#/components/schemas/ShootTeamMember"
        equipmentItems:
          type: array
          items:
            $ref: "#/components/schemas/ShootEquipmentItem"
        checkout:
          $ref: "#/components/schemas/Checkout"
          nullable: true
        return:
          $ref: "#/components/schemas/Return"
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, date, location, priority, status, team, equipmentItems, createdAt, updatedAt]

    ActivityLog:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
        description:
          type: string
        shootId:
          type: ["integer", "null"]
        equipmentId:
          type: ["integer", "null"]
        teamMemberId:
          type: ["integer", "null"]
        metadata:
          type: ["string", "null"]
        createdAt:
          type: string
      required: [id, type, description, createdAt]
